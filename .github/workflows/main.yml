name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix Folders (Smartphone Hack)
        # Этот шаг превратит твои "плоские" файлы в структуру папок Android
        run: |
          mkdir -p app/src/main/java/com/example/reader
          # Ищем твой файл с кодом и кладем его куда нужно
          find . -name "MainActivity.kt" -exec cp {} app/src/main/java/com/example/reader/MainActivity.kt \;
          # Ищем манифест
          find . -name "AndroidManifest.xml" -exec cp {} app/src/main/AndroidManifest.xml \;
          # Проверяем build.gradle
          find . -name "build.gradle" -not -path "./build.gradle" -exec cp {} app/build.gradle \;

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1.1

      - name: Build APK
        # Собираем конкретно модуль :app
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReaderApp-Final
          path: app/build/outputs/apk/debug/*.apk
