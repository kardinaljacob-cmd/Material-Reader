name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Force Fix Structure
        run: |
          # 1. Создаем чистую структуру папок
          mkdir -p temp_app/src/main/java/com/example/reader
          
          # 2. Ищем самый большой build.gradle (наш основной) и копируем в temp_app
          find . -name "build.gradle" -exec grep -l "com.android.application" {} + | head -n 1 | xargs -I {} cp {} temp_app/build.gradle
          
          # 3. Ищем манифест и код
          find . -name "AndroidManifest.xml" -exec cp {} temp_app/src/main/AndroidManifest.xml \;
          find . -name "MainActivity.kt" -exec cp {} temp_app/src/main/java/com/example/reader/MainActivity.kt \;
          
          # 4. Удаляем старую папку app (если она мешает) и заменяем новой
          rm -rf app
          mv temp_app app
          
          # 5. Создаем правильный settings.gradle
          echo "include ':app'" > settings.gradle
          echo "rootProject.name = 'Material-Reader'" >> settings.gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1.1

      - name: Build APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Reader-Final-v1
          path: app/build/outputs/apk/debug/*.apk
